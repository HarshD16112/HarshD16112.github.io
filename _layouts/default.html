<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.author.name }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">
  <!-- SEO -->
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <!-- Fonts + CSS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚗</text></svg>">
  {% seo %}
</head>
<body>

  <!-- NAV -->
  <nav class="site-nav">
    <div class="nav-inner">
      <div class="nav-brand">
        <span class="prompt">~/</span>
        <span>harsh.darji</span>
        <span class="cursor"></span>
      </div>
      <ul class="nav-links">
        {% for item in site.data.navigation.main %}
        <li>
          <a href="{{ item.url | relative_url }}"
             {% if page.url == item.url %}class="active"{% endif %}>
            {{ item.title }}
          </a>
        </li>
        {% endfor %}
      </ul>
    </div>
  </nav>

  <!-- MAIN -->
  <main>
    {{ content }}
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-copy">
        &copy; {{ 'now' | date: '%Y' }} Harsh R. Darji &nbsp;·&nbsp;
        <span style="color:var(--text3)">University of Wisconsin–Madison</span>
      </div>
      <div class="footer-links">
        <a href="{{ site.author.github }}" target="_blank" rel="noopener">GitHub</a>
        <a href="{{ site.author.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
        <a href="mailto:{{ site.author.email }}">Email</a>
      </div>
    </div>
  </footer>

</body>
</html>
